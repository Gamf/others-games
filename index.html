<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#efe6d2">
  <title>Borrowed — GAMF Quarterly</title>
  <meta name="description" content="Borrowed games — small, free, open-source games by other people, kept here with thanks and their own authors & licences.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="gamf.css">
</head>
<body class="gx">
  <script src="gamf-icons.js"></script>
  <script src="gamf-stats.js"></script>

  <nav class="gx-nav">
    <div class="gx-nav__inner">
      <a class="gx-logo" href="../">GAMF</a>
      <span class="gx-nav__spacer"></span>
      <a class="gx-hiscores" href="../stats.html">your scores</a>
      <a class="gx-back" href="../">← the rack</a>
    </div>
  </nav>

  <div class="gx-wrap">
    <header>
      <h2 class="gx-section-title">Borrowed — games by other people, with thanks</h2>
    </header>

    <main id="cats">
      <div class="gx-grid">
        <div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div>
        <div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div>
      </div>
      <p class="gx-error" id="err" hidden></p>
    </main>

    <footer class="gx-foot">
      <div class="gx-foot__meta">
        <p>Borrowed from people with taste — every game here keeps its own author and licence, credited and never stolen.</p>
        <p class="dim">Set in Fraunces &amp; Newsreader · hosted on GitHub Pages.</p>
      </div>
    </footer>
  </div>

  <script type="module">
    const CAT_ICON = { 'Puzzle & Board': 'i-puzzle', 'Arcade & Retro': 'i-arcade', '3D / WebGL': 'i-cube', 'Cards & Casual': 'i-coin' };
    const GENRE = 'others-games';
    const esc = (s = '') => String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const fmt = (n) => Number(n).toLocaleString('en-US');
    const ico = (id) => `<svg class="gx-ico"><use href="#${id}"/></svg>`;
    const bestOf = (slug) => { try { return +(localStorage.getItem(`gamf-${GENRE}-${slug}-best`)) || 0; } catch { return 0; } };

    init();

    async function init() {
      if (window.gamfVisit) window.gamfVisit();
      let data;
      try { data = await fetchJSON(new URL('games.json', document.baseURI)); }
      catch (e) {
        const main = document.getElementById('cats');
        main.innerHTML = `<p class="gx-error">The press jammed — couldn't load games.json (${esc(e.message)}).</p>`;
        return;
      }

      const order = data.categoryOrder || [];
      const games = (data.games || []).map(decorate);
      const byCat = {};
      games.forEach((g) => { (byCat[g.category] = byCat[g.category] || []).push(g); });

      const cats = order.filter((c) => byCat[c] && byCat[c].length);
      const flat = cats.flatMap((c) => byCat[c]);
      const main = document.getElementById('cats');
      main.innerHTML = cats.map((cat) => section(cat, byCat[cat])).join('');

      main.querySelectorAll('.gx-cabinet').forEach((a, i) => {
        a.addEventListener('click', (ev) => {
          if (ev.target.closest('.gx-btn')) return; // let the source link do its own thing
          ev.preventDefault();
          launch(flat[i]);
        });
      });
    }

    function decorate(game) {
      return {
        slug: game.slug,
        title: game.title,
        category: game.category,
        dims: game.dims || '2D',
        tags: game.tags || [],
        license: game.license || '',
        author: game.author || '',
        source: game.source || '',
        url: new URL(game.path, document.baseURI).href,
        icon: CAT_ICON[game.category] || 'i-coin',
        best: bestOf(game.slug),
      };
    }

    function section(cat, list) {
      return `<section>
        <div class="gx-cabhead">
          <h2>${esc(cat)}</h2>
          <span class="gx-cabhead__count">${list.length} ${list.length === 1 ? 'entry' : 'entries'}</span>
        </div>
        <div class="gx-grid">${list.map(cabinet).join('')}</div>
      </section>`;
    }

    function cabinet(g) {
      // Real local best if the reader has one; otherwise the borrowed-game meta
      // (licence · by author), since forks have no fabricated score.
      let hi;
      if (g.best > 0) {
        hi = `Best ${fmt(g.best)}`;
      } else {
        const bits = [];
        if (g.license) bits.push(g.license);
        if (g.author) bits.push(`by ${g.author}`);
        hi = bits.join(' · ') || (g.tags.slice(0, 2).join(', ') || g.dims);
      }
      const src = g.source
        ? `<a class="gx-btn gx-btn--sm" href="${esc(g.source)}" target="_blank" rel="noopener">${ico('i-search')} source</a>`
        : '';
      return `<a class="gx-cabinet" href="${esc(g.url)}">
        <div class="gx-cab__plate">${ico(g.icon)}<span class="gx-cab__genre">${esc(g.category)}</span><span class="gx-cab__dims">${esc(g.dims)}</span></div>
        <h3 class="gx-cab__title">${esc(g.title)}</h3>
        <div class="gx-cab__ctrl"><span class="gx-cab__hi">${esc(hi)}${src}</span><span class="gx-cab__play">Play</span></div>
      </a>`;
    }

    let navigating = false;
    function launch(g) {
      if (!g || navigating) return;
      navigating = true;
      if (window.gamfPlay) window.gamfPlay(g.slug);
      window.location.href = g.url;
    }

    async function fetchJSON(url) {
      const res = await fetch(url, { cache: 'no-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }
  </script>
</body>
</html>
