<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#07080c">
  <title>Others' Games — Gamf</title>
  <meta name="description" content="Open-source games by other developers — forked, touch-tuned, and hosted here with full credit.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="gamf.css">
</head>
<body class="gx" style="--gx-accent:#f2c14e">
  <script src="gamf-icons.js"></script>
  <script src="gamf-stats.js"></script>

  <nav class="gx-nav">
    <div class="gx-nav__inner">
      <a class="gx-logo" href="../">
        <span class="gx-logo__mark"><svg class="gx-ico"><use href="#i-logo"/></svg></span>
        Gamf
      </a>
      <span class="gx-nav__spacer"></span>
      <div class="gx-nav__links">
        <a class="gx-btn gx-btn--ghost gx-btn--sm" href="../stats.html"><svg class="gx-ico"><use href="#i-stats"/></svg> Stats</a>
        <a class="gx-btn gx-btn--ghost gx-btn--sm gx-back" href="../"><svg class="gx-ico"><use href="#i-back"/></svg> Hub</a>
      </div>
    </div>
  </nav>

  <div class="gx-wrap">
    <header style="text-align:center;margin:var(--sp-5) 0 var(--sp-2)">
      <h1 class="gx-section-title" style="margin:0">Others' Games</h1>
      <p style="color:var(--gx-text-2);margin:6px 0 0">Open-source games by other developers — forked, touch-tuned, hosted here with full credit.</p>
    </header>

    <main id="cats">
      <div class="gx-row">
        <div class="gx-row__head"><span class="gx-row__title">Loading…</span></div>
        <div class="gx-grid">
          <div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div><div class="gx-skel"></div>
        </div>
      </div>
    </main>
  </div>

  <footer class="gx-foot gx-wrap">Each game keeps its original author &amp; license · “Source” links to the fork on GitHub</footer>

  <script type="module">
    // Icon per category (falls back to the row pad icon).
    const CAT_ICON = {
      'Puzzle & Board': 'i-puzzle',
      'Arcade & Retro': 'i-arcade',
      '3D / WebGL': 'i-cube',
      'Cards & Casual': 'i-pad',
    };

    const main = document.getElementById('cats');
    const esc = (s = '') => String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const safeColor = (c) => (/^#[0-9a-fA-F]{3,8}$/.test(c || '') ? c : '#7c5cff');

    if (window.gamfVisit) window.gamfVisit();

    try {
      const res = await fetch('games.json', { cache: 'no-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const games = data.games || [];

      // group by category
      const byCat = new Map();
      for (const g of games) {
        const k = g.category || 'Other';
        if (!byCat.has(k)) byCat.set(k, []);
        byCat.get(k).push(g);
      }

      // order by data.categoryOrder, then any extras alphabetically
      const order = data.categoryOrder || [];
      const cats = [...byCat.keys()].sort((a, b) => {
        const ia = order.indexOf(a), ib = order.indexOf(b);
        return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib) || a.localeCompare(b);
      });

      main.innerHTML = games.length ? '' : '<p class="gx-empty">No games listed yet.</p>';

      for (const cat of cats) {
        const list = byCat.get(cat);
        const section = document.createElement('section');
        section.className = 'gx-row';
        section.innerHTML = `
          <div class="gx-row__head">
            <span class="gx-row__icon"><svg class="gx-ico"><use href="#${CAT_ICON[cat] || 'i-pad'}"/></svg></span>
            <span class="gx-row__title">${esc(cat)}</span>
            <span class="gx-row__count">${list.length} game${list.length === 1 ? '' : 's'}</span>
          </div>
          <div class="gx-grid"></div>`;
        const grid = section.querySelector('.gx-grid');
        for (const g of list) grid.appendChild(card(g));
        main.appendChild(section);
      }
    } catch (e) {
      main.innerHTML = `<p class="gx-error">Couldn't load games.json — ${esc(e.message)}</p>`;
    }

    function card(g) {
      const card = document.createElement('div');
      card.className = 'gx-card';
      const cover = safeColor(g.color);
      const tags = (g.tags || []).slice(0, 3).map(esc).join(' · ');
      card.innerHTML = `
        <a class="gx-cover" href="${esc(g.path)}" style="--cover:${cover}" data-play>
          ${g.dims ? `<span class="gx-cover__dims">${esc(g.dims)}</span>` : ''}
          <span class="gx-cover__glyph">${esc(g.icon || '🎮')}</span>
          <span class="gx-cover__play"><svg class="gx-ico"><use href="#i-play"/></svg></span>
        </a>
        <div class="gx-card__body">
          <a class="gx-card__title" href="${esc(g.path)}" data-play>${esc(g.title)}</a>
          ${tags ? `<span class="gx-card__meta">${tags}</span>` : ''}
          ${g.author ? `<span class="gx-card__by">by ${esc(g.author)}</span>` : ''}
          <div class="gx-chips">
            ${g.license ? `<span class="gx-badge">${esc(g.license)}</span>` : ''}
          </div>
          ${g.source ? `<a class="gx-btn gx-btn--ghost gx-btn--sm" style="margin-top:var(--sp-2)" href="${esc(g.source)}" target="_blank" rel="noopener"><svg class="gx-ico"><use href="#i-globe"/></svg> Source</a>` : ''}
        </div>`;
      // count a play on either Play link (cover or title) before navigating
      for (const el of card.querySelectorAll('[data-play]')) {
        el.addEventListener('click', () => window.gamfPlay && window.gamfPlay(g.slug));
      }
      return card;
    }
  </script>
</body>
</html>
