<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- background -->
  <rect x="0" y="0" width="320" height="200" fill="#221f17"/>

  <!-- maze floor (concrete) -->
  <rect x="24" y="20" width="272" height="160" fill="#efe6d2"/>
  <rect x="24" y="20" width="272" height="160" fill="none" stroke="#6f6a3b" stroke-width="4"/>

  <!-- maze walls: a grid of brick blocks forming a maze pattern.
       Wall block = oxblood with an ochre top face to suggest 3D height. -->

  <!-- top border run -->
  <rect x="56" y="20" width="32" height="32" fill="#9b3a22"/>
  <rect x="56" y="20" width="32" height="8" fill="#c8923a"/>
  <rect x="120" y="20" width="32" height="32" fill="#9b3a22"/>
  <rect x="120" y="20" width="32" height="8" fill="#c8923a"/>
  <rect x="184" y="20" width="32" height="32" fill="#9b3a22"/>
  <rect x="184" y="20" width="32" height="8" fill="#c8923a"/>

  <!-- second row -->
  <rect x="56" y="52" width="32" height="32" fill="#9b3a22"/>
  <rect x="56" y="52" width="32" height="8" fill="#c8923a"/>
  <rect x="184" y="52" width="32" height="32" fill="#9b3a22"/>
  <rect x="184" y="52" width="32" height="8" fill="#c8923a"/>
  <rect x="248" y="52" width="32" height="32" fill="#9b3a22"/>
  <rect x="248" y="52" width="32" height="8" fill="#c8923a"/>

  <!-- middle row -->
  <rect x="56" y="116" width="32" height="32" fill="#9b3a22"/>
  <rect x="56" y="116" width="32" height="8" fill="#c8923a"/>
  <rect x="120" y="84" width="32" height="32" fill="#9b3a22"/>
  <rect x="120" y="84" width="32" height="8" fill="#c8923a"/>
  <rect x="120" y="116" width="32" height="32" fill="#9b3a22"/>
  <rect x="120" y="116" width="32" height="8" fill="#c8923a"/>
  <rect x="184" y="116" width="32" height="32" fill="#9b3a22"/>
  <rect x="184" y="116" width="32" height="8" fill="#c8923a"/>

  <!-- bottom row -->
  <rect x="56" y="148" width="32" height="32" fill="#9b3a22"/>
  <rect x="56" y="148" width="32" height="8" fill="#c8923a"/>
  <rect x="248" y="116" width="32" height="32" fill="#9b3a22"/>
  <rect x="248" y="116" width="32" height="8" fill="#c8923a"/>
  <rect x="248" y="148" width="32" height="32" fill="#9b3a22"/>
  <rect x="248" y="148" width="32" height="8" fill="#c8923a"/>

  <!-- exit gap marker (olive glow square near right edge) -->
  <rect x="252" y="84" width="24" height="28" fill="#6f6a3b"/>
  <polygon points="264,90 274,98 264,106 264,102 258,102 258,94 264,94" fill="#efe6d2"/>

  <!-- the rolling steel ball (cream base + ochre rim + ink shadow for 3D) -->
  <ellipse cx="103" cy="150" rx="16" ry="6" fill="#221f17" opacity="0.35"/>
  <circle cx="100" cy="138" r="18" fill="#c8923a"/>
  <circle cx="100" cy="138" r="18" fill="none" stroke="#221f17" stroke-width="2"/>
  <circle cx="94" cy="132" r="6" fill="#efe6d2"/>
  <path d="M88 146 a18 18 0 0 0 24 -4" fill="none" stroke="#221f17" stroke-width="2" opacity="0.4"/>

  <!-- motion path arrow toward exit -->
  <polygon points="208,138 230,128 230,134 240,134 240,142 230,142 230,148" fill="#6f6a3b"/>
</svg>
