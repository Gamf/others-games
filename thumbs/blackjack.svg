<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#6f6a3b"/>
  <rect x="20" y="20" width="280" height="160" rx="10" fill="#5e5a33"/>

  <!-- Back card (tilted, ace) -->
  <g transform="rotate(-12 120 110)">
    <rect x="70" y="55" width="92" height="124" rx="9" fill="#efe6d2"/>
    <rect x="70" y="55" width="92" height="124" rx="9" fill="none" stroke="#221f17" stroke-width="2"/>
    <!-- corner pip A -->
    <path d="M82 70 l6 16 h-12 z" fill="#9b3a22"/>
    <rect x="80" y="84" width="10" height="3" fill="#9b3a22"/>
    <!-- centre spade -->
    <path d="M116 95 c-14 14 -26 20 -26 32 c0 9 8 14 16 11 l-3 12 h26 l-3 -12 c8 3 16 -2 16 -11 c0 -12 -12 -18 -26 -32 z" fill="#221f17"/>
  </g>

  <!-- Front card (tilted other way, ten) -->
  <g transform="rotate(10 205 115)">
    <rect x="165" y="62" width="92" height="124" rx="9" fill="#efe6d2"/>
    <rect x="165" y="62" width="92" height="124" rx="9" fill="none" stroke="#221f17" stroke-width="2"/>
    <!-- corner value 10 (two blocks) -->
    <rect x="176" y="76" width="5" height="14" fill="#9b3a22"/>
    <rect x="184" y="76" width="11" height="14" rx="5" fill="none" stroke="#9b3a22" stroke-width="3"/>
    <!-- centre diamonds -->
    <path d="M211 102 l11 16 l-11 16 l-11 -16 z" fill="#9b3a22"/>
    <path d="M211 138 l8 12 l-8 12 l-8 -12 z" fill="#9b3a22"/>
  </g>

  <!-- Poker chip -->
  <circle cx="92" cy="160" r="26" fill="#221f17"/>
  <circle cx="92" cy="160" r="26" fill="none" stroke="#c8923a" stroke-width="4"/>
  <circle cx="92" cy="160" r="15" fill="none" stroke="#c8923a" stroke-width="3" stroke-dasharray="7 5"/>
  <circle cx="92" cy="160" r="7" fill="#9b3a22"/>
  <rect x="66" y="156" width="8" height="8" fill="#c8923a"/>
  <rect x="110" y="156" width="8" height="8" fill="#c8923a"/>
  <rect x="88" y="132" width="8" height="8" fill="#c8923a"/>
  <rect x="88" y="180" width="8" height="8" fill="#c8923a"/>
</svg>
