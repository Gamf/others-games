<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect x="0" y="0" width="320" height="200" fill="#221f17"/>

  <!-- starfield (flat squares) -->
  <rect x="22" y="22" width="3" height="3" fill="#efe6d2"/>
  <rect x="58" y="48" width="2" height="2" fill="#efe6d2"/>
  <rect x="104" y="16" width="3" height="3" fill="#efe6d2"/>
  <rect x="168" y="40" width="2" height="2" fill="#efe6d2"/>
  <rect x="214" y="20" width="3" height="3" fill="#efe6d2"/>
  <rect x="284" y="34" width="2" height="2" fill="#efe6d2"/>
  <rect x="300" y="70" width="3" height="3" fill="#efe6d2"/>
  <rect x="16" y="96" width="2" height="2" fill="#efe6d2"/>
  <rect x="262" y="110" width="2" height="2" fill="#efe6d2"/>
  <rect x="40" y="150" width="2" height="2" fill="#efe6d2"/>

  <!-- ===== enemy boss ship (top, oxblood) ===== -->
  <g fill="#9b3a22">
    <rect x="132" y="20" width="56" height="20"/>
    <rect x="120" y="26" width="16" height="10"/>
    <rect x="184" y="26" width="16" height="10"/>
    <rect x="148" y="14" width="24" height="8"/>
    <rect x="146" y="40" width="28" height="8"/>
  </g>
  <!-- boss eye / core (ochre) -->
  <rect x="152" y="24" width="16" height="10" fill="#c8923a"/>
  <rect x="156" y="27" width="8" height="5" fill="#221f17"/>

  <!-- ===== radial bullet spray from boss (ochre dots) ===== -->
  <g fill="#c8923a">
    <!-- center column -->
    <rect x="157" y="60" width="6" height="6"/>
    <rect x="157" y="84" width="6" height="6"/>
    <rect x="157" y="110" width="6" height="6"/>
    <!-- left fan -->
    <rect x="132" y="62" width="6" height="6"/>
    <rect x="112" y="82" width="6" height="6"/>
    <rect x="96" y="106" width="6" height="6"/>
    <rect x="108" y="58" width="5" height="5"/>
    <rect x="82" y="76" width="5" height="5"/>
    <rect x="64" y="98" width="5" height="5"/>
    <!-- right fan -->
    <rect x="182" y="62" width="6" height="6"/>
    <rect x="202" y="82" width="6" height="6"/>
    <rect x="218" y="106" width="6" height="6"/>
    <rect x="207" y="58" width="5" height="5"/>
    <rect x="232" y="76" width="5" height="5"/>
    <rect x="250" y="98" width="5" height="5"/>
  </g>

  <!-- ===== scattered olive bullets (second spread) ===== -->
  <g fill="#6f6a3b">
    <rect x="142" y="74" width="5" height="5"/>
    <rect x="173" y="74" width="5" height="5"/>
    <rect x="124" y="100" width="5" height="5"/>
    <rect x="191" y="100" width="5" height="5"/>
    <rect x="158" y="128" width="6" height="6"/>
    <rect x="138" y="120" width="5" height="5"/>
    <rect x="177" y="120" width="5" height="5"/>
  </g>

  <!-- ===== player shot stream rising (cream) ===== -->
  <rect x="158" y="150" width="5" height="14" fill="#efe6d2"/>
  <rect x="158" y="138" width="5" height="8" fill="#efe6d2"/>

  <!-- ===== player ship (bottom, olive with cream cockpit) ===== -->
  <g fill="#6f6a3b">
    <rect x="146" y="172" width="30" height="14"/>
    <rect x="154" y="164" width="14" height="10"/>
    <rect x="134" y="178" width="14" height="10"/>
    <rect x="174" y="178" width="14" height="10"/>
    <rect x="142" y="186" width="10" height="8"/>
    <rect x="170" y="186" width="10" height="8"/>
  </g>
  <rect x="157" y="167" width="8" height="7" fill="#efe6d2"/>
  <!-- engine glow -->
  <rect x="152" y="186" width="6" height="6" fill="#c8923a"/>
  <rect x="164" y="186" width="6" height="6" fill="#c8923a"/>
</svg>
