<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- felt table -->
  <rect width="320" height="200" fill="#6f6a3b"/>
  <rect x="10" y="10" width="300" height="180" rx="10" fill="#5e5a33"/>

  <!-- top row: four free cells (left) -->
  <g fill="none" stroke="#efe6d2" stroke-width="2">
    <rect x="24" y="22" width="32" height="40" rx="4"/>
    <rect x="60" y="22" width="32" height="40" rx="4"/>
    <rect x="96" y="22" width="32" height="40" rx="4"/>
    <rect x="132" y="22" width="32" height="40" rx="4"/>
  </g>
  <!-- a single card resting in the first free cell -->
  <rect x="27" y="25" width="26" height="34" rx="3" fill="#efe6d2"/>
  <path d="M40 30 c-5 5 -9 7 -9 12 c0 3 3 5 6 4 l-1 5 h8 l-1 -5 c3 1 6 -1 6 -4 c0 -5 -4 -7 -9 -12 z" fill="#221f17"/>

  <!-- top row: four foundations (right) with suit markers -->
  <g fill="#5a5630" stroke="#c8923a" stroke-width="2">
    <rect x="180" y="22" width="32" height="40" rx="4"/>
    <rect x="216" y="22" width="32" height="40" rx="4"/>
    <rect x="252" y="22" width="32" height="40" rx="4"/>
    <rect x="288" y="22" width="24" height="40" rx="4"/>
  </g>
  <!-- spade -->
  <path d="M196 30 c-6 6 -11 9 -11 14 c0 4 4 6 7 5 l-1 6 h10 l-1 -6 c3 1 7 -1 7 -5 c0 -5 -5 -8 -11 -14 z" fill="#221f17"/>
  <!-- heart -->
  <path d="M232 34 c-3 -4 -10 -3 -10 3 c0 5 10 12 10 12 c0 0 10 -7 10 -12 c0 -6 -7 -7 -10 -3 z" fill="#9b3a22"/>
  <!-- diamond -->
  <path d="M268 31 l8 11 l-8 11 l-8 -11 z" fill="#9b3a22"/>
  <!-- club -->
  <g fill="#221f17">
    <circle cx="300" cy="36" r="5"/>
    <circle cx="294" cy="44" r="5"/>
    <circle cx="306" cy="44" r="5"/>
    <rect x="297" y="44" width="6" height="9"/>
  </g>

  <!-- tableau: cascading columns of cards -->
  <!-- column 1 -->
  <g>
    <rect x="24" y="84" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="24" y="100" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="24" y="116" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <path d="M29 121 l5 7 l-5 7 l-5 -7 z" fill="#9b3a22"/>
  </g>
  <!-- column 2 -->
  <g>
    <rect x="63" y="84" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="63" y="100" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <path d="M73 105 c-4 4 -7 6 -7 10 c0 2 2 4 5 3 l-1 4 h6 l-1 -4 c3 1 5 -1 5 -3 c0 -4 -3 -6 -7 -10 z" fill="#221f17"/>
  </g>
  <!-- column 3 -->
  <g>
    <rect x="102" y="84" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="102" y="100" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="102" y="116" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="102" y="132" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <path d="M112 138 c-3 -3 -8 -2 -8 3 c0 4 8 9 8 9 c0 0 8 -5 8 -9 c0 -5 -5 -6 -8 -3 z" fill="#9b3a22"/>
  </g>
  <!-- column 4 -->
  <g>
    <rect x="141" y="84" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="141" y="100" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <g fill="#221f17">
      <circle cx="156" cy="106" r="4"/>
      <circle cx="151" cy="112" r="4"/>
      <circle cx="161" cy="112" r="4"/>
      <rect x="153.5" y="112" width="5" height="7"/>
    </g>
  </g>
  <!-- column 5 -->
  <g>
    <rect x="180" y="84" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="180" y="100" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="180" y="116" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <path d="M195 122 l6 8 l-6 8 l-6 -8 z" fill="#9b3a22"/>
  </g>
  <!-- column 6 -->
  <g>
    <rect x="219" y="84" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="219" y="100" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <path d="M234 105 c-4 4 -7 6 -7 10 c0 2 2 4 5 3 l-1 4 h6 l-1 -4 c3 1 5 -1 5 -3 c0 -4 -3 -6 -7 -10 z" fill="#221f17"/>
  </g>
  <!-- column 7 -->
  <g>
    <rect x="258" y="84" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="258" y="100" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="258" y="116" width="30" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <path d="M273 122 c-3 -3 -8 -2 -8 3 c0 4 8 9 8 9 c0 0 8 -5 8 -9 c0 -5 -5 -6 -8 -3 z" fill="#9b3a22"/>
  </g>
  <!-- column 8 -->
  <g>
    <rect x="288" y="84" width="24" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <rect x="288" y="100" width="24" height="40" rx="3" fill="#efe6d2" stroke="#221f17" stroke-width="1.5"/>
    <path d="M300 106 c-4 4 -7 6 -7 10 c0 2 2 4 5 3 l-1 4 h6 l-1 -4 c3 1 5 -1 5 -3 c0 -4 -3 -6 -7 -10 z" fill="#221f17"/>
  </g>
</svg>
