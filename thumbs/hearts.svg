<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#efe6d2"/>
  <rect x="20" y="20" width="280" height="160" rx="10" fill="#6f6a3b"/>
  <rect x="34" y="34" width="252" height="132" rx="6" fill="#7d7843"/>

  <!-- Left fanned card: ochre, spade-ish dark pip -->
  <g transform="translate(96 120) rotate(-22)">
    <rect x="-30" y="-46" width="60" height="92" rx="7" fill="#efe6d2" stroke="#221f17" stroke-width="2"/>
    <path d="M0 -18 C 12 -34 34 -22 0 6 C -34 -22 -12 -34 0 -18 Z" fill="#221f17"/>
    <rect x="-9" y="14" width="18" height="5" fill="#221f17"/>
  </g>

  <!-- Right fanned card: ochre, ochre heart -->
  <g transform="translate(224 120) rotate(22)">
    <rect x="-30" y="-46" width="60" height="92" rx="7" fill="#efe6d2" stroke="#221f17" stroke-width="2"/>
    <path d="M0 -16 C 11 -32 33 -20 0 8 C -33 -20 -11 -32 0 -16 Z" fill="#c8923a"/>
    <rect x="-9" y="16" width="18" height="5" fill="#c8923a"/>
  </g>

  <!-- Center card: cream face with big oxblood heart -->
  <g transform="translate(160 108)">
    <rect x="-34" y="-54" width="68" height="108" rx="8" fill="#efe6d2" stroke="#221f17" stroke-width="3"/>
    <path d="M0 -24 C 18 -50 52 -30 0 16 C -52 -30 -18 -50 0 -24 Z" fill="#9b3a22"/>
  </g>

  <!-- Corner heart pips on center card -->
  <path d="M137 -16 C 142 -23 152 -17 137 1 C 122 -17 132 -23 137 -16 Z" transform="translate(0 78)" fill="#9b3a22"/>
  <path d="M183 -16 C 188 -23 198 -17 183 1 C 168 -17 178 -23 183 -16 Z" transform="translate(0 78)" fill="#9b3a22"/>
</svg>
