<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- felt table -->
  <rect width="320" height="200" fill="#6f6a3b"/>
  <rect x="10" y="10" width="300" height="180" rx="12" fill="#5e5a33"/>

  <!-- ===== bottom layer of tiles (the wide base) ===== -->
  <!-- each tile: oxblood back/edge + cream face -->
  <g>
    <!-- base row 1 -->
    <rect x="40" y="120" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="38" y="116" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="40" y="118" width="30" height="42" rx="4" fill="#efe6d2"/>

    <rect x="78" y="120" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="76" y="116" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="78" y="118" width="30" height="42" rx="4" fill="#efe6d2"/>

    <rect x="116" y="120" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="114" y="116" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="116" y="118" width="30" height="42" rx="4" fill="#efe6d2"/>

    <rect x="154" y="120" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="152" y="116" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="154" y="118" width="30" height="42" rx="4" fill="#efe6d2"/>

    <rect x="192" y="120" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="190" y="116" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="192" y="118" width="30" height="42" rx="4" fill="#efe6d2"/>

    <rect x="230" y="120" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="228" y="116" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="230" y="118" width="30" height="42" rx="4" fill="#efe6d2"/>
  </g>

  <!-- ===== middle layer (offset up-left, narrower) ===== -->
  <g>
    <rect x="68" y="82" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="66" y="78" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="68" y="80" width="30" height="42" rx="4" fill="#efe6d2"/>

    <rect x="106" y="82" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="104" y="78" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="106" y="80" width="30" height="42" rx="4" fill="#efe6d2"/>

    <rect x="144" y="82" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="142" y="78" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="144" y="80" width="30" height="42" rx="4" fill="#efe6d2"/>

    <rect x="182" y="82" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="180" y="78" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="182" y="80" width="30" height="42" rx="4" fill="#efe6d2"/>
  </g>

  <!-- ===== top tile (single, the apex) ===== -->
  <g>
    <rect x="126" y="46" width="34" height="46" rx="5" fill="#9b3a22"/>
    <rect x="124" y="42" width="34" height="46" rx="5" fill="#221f17"/>
    <rect x="126" y="44" width="30" height="42" rx="4" fill="#efe6d2"/>
  </g>

  <!-- ===== tile face symbols ===== -->

  <!-- bamboo (two stalks) on base tile 1 -->
  <g stroke="#6f6a3b" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="126" x2="50" y2="152"/>
    <line x1="60" y1="126" x2="60" y2="152"/>
  </g>
  <g fill="#6f6a3b">
    <rect x="47" y="135" width="16" height="3"/>
  </g>

  <!-- circle/dot tile on base tile 3 -->
  <circle cx="131" cy="139" r="11" fill="none" stroke="#9b3a22" stroke-width="3"/>
  <circle cx="131" cy="139" r="4" fill="#c8923a"/>

  <!-- red dragon (oxblood block) on base tile 5 -->
  <rect x="200" y="129" width="14" height="20" rx="2" fill="#9b3a22"/>
  <rect x="203" y="133" width="8" height="3" fill="#efe6d2"/>
  <rect x="203" y="139" width="8" height="3" fill="#efe6d2"/>

  <!-- character/wind glyph (ochre) on middle tile 2 -->
  <g fill="#c8923a">
    <rect x="111" y="90" width="20" height="3"/>
    <rect x="119" y="93" width="4" height="22"/>
    <rect x="113" y="100" width="16" height="3"/>
    <rect x="113" y="108" width="16" height="3"/>
  </g>

  <!-- green bamboo-leaf glyph (olive) on middle tile 4 -->
  <g fill="#6f6a3b">
    <path d="M190 94 l8 8 l8 -8 l-2 -2 l-6 6 l-6 -6 z"/>
    <rect x="195" y="100" width="6" height="14" rx="2"/>
  </g>

  <!-- ===== highlighted matched pair: olive outline on two tiles ===== -->
  <rect x="68" y="80" width="30" height="42" rx="4" fill="none" stroke="#c8923a" stroke-width="3"/>
  <rect x="126" y="44" width="30" height="42" rx="4" fill="none" stroke="#c8923a" stroke-width="3"/>

  <!-- character glyph on the highlighted middle tile 1 (matches apex) -->
  <g fill="#c8923a">
    <rect x="73" y="90" width="20" height="3"/>
    <rect x="81" y="93" width="4" height="22"/>
    <rect x="75" y="100" width="16" height="3"/>
    <rect x="75" y="108" width="16" height="3"/>
  </g>
  <!-- same character glyph on apex tile -->
  <g fill="#c8923a">
    <rect x="131" y="54" width="20" height="3"/>
    <rect x="139" y="57" width="4" height="22"/>
    <rect x="133" y="64" width="16" height="3"/>
    <rect x="133" y="72" width="16" height="3"/>
  </g>
</svg>
