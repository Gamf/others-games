<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- board panel -->
  <rect x="60" y="20" width="200" height="160" rx="10" fill="#221f17"/>
  <rect x="70" y="30" width="180" height="140" rx="6" fill="#6f6a3b"/>

  <!-- Row 1 -->
  <!-- round gem (ochre) -->
  <circle cx="92" cy="52" r="14" fill="#c8923a"/>
  <circle cx="87" cy="47" r="4" fill="#efe6d2"/>
  <!-- diamond gem (oxblood) -->
  <polygon points="136,38 150,52 136,66 122,52" fill="#9b3a22"/>
  <polygon points="136,38 143,52 136,46" fill="#efe6d2"/>
  <!-- round gem (cream) -->
  <circle cx="180" cy="52" r="14" fill="#efe6d2"/>
  <circle cx="175" cy="47" r="4" fill="#c8923a"/>
  <!-- square gem (ochre) -->
  <rect x="210" y="38" width="28" height="28" rx="5" fill="#c8923a"/>
  <rect x="215" y="43" width="8" height="8" rx="2" fill="#efe6d2"/>

  <!-- Row 2 -->
  <!-- diamond gem (cream) -->
  <polygon points="92,82 106,96 92,110 78,96" fill="#efe6d2"/>
  <polygon points="92,82 99,96 92,90" fill="#c8923a"/>
  <!-- round gem (oxblood) - highlighted/selected -->
  <circle cx="136" cy="96" r="16" fill="#221f17"/>
  <circle cx="136" cy="96" r="14" fill="#9b3a22"/>
  <circle cx="131" cy="91" r="4" fill="#efe6d2"/>
  <!-- square gem (oxblood) -->
  <rect x="166" y="82" width="28" height="28" rx="5" fill="#9b3a22"/>
  <rect x="171" y="87" width="8" height="8" rx="2" fill="#efe6d2"/>
  <!-- round gem (ochre) -->
  <circle cx="224" cy="96" r="14" fill="#c8923a"/>
  <circle cx="219" cy="91" r="4" fill="#efe6d2"/>

  <!-- Row 3 -->
  <!-- square gem (cream) -->
  <rect x="78" y="126" width="28" height="28" rx="5" fill="#efe6d2"/>
  <rect x="83" y="131" width="8" height="8" rx="2" fill="#9b3a22"/>
  <!-- round gem (ochre) -->
  <circle cx="136" cy="140" r="14" fill="#c8923a"/>
  <circle cx="131" cy="135" r="4" fill="#efe6d2"/>
  <!-- diamond gem (oxblood) -->
  <polygon points="180,126 194,140 180,154 166,140" fill="#9b3a22"/>
  <polygon points="180,126 187,140 180,134" fill="#efe6d2"/>
  <!-- round gem (cream) -->
  <circle cx="224" cy="140" r="14" fill="#efe6d2"/>
  <circle cx="219" cy="135" r="4" fill="#c8923a"/>

  <!-- swap arrows hinting at the match-3 action -->
  <polygon points="150,96 158,90 158,102" fill="#efe6d2"/>
  <polygon points="160,96 152,90 152,102" fill="#efe6d2"/>
</svg>
