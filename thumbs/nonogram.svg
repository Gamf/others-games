<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#efe6d2"/>

  <!-- clue panel top-left corner -->
  <rect x="40" y="40" width="60" height="60" fill="#6f6a3b"/>

  <!-- top clue strip -->
  <rect x="100" y="40" width="180" height="60" fill="#c8923a"/>
  <!-- left clue strip -->
  <rect x="40" y="100" width="60" height="90" fill="#c8923a"/>

  <!-- top clue marks -->
  <rect x="112" y="78" width="12" height="10" fill="#221f17"/>
  <rect x="112" y="62" width="12" height="10" fill="#221f17"/>
  <rect x="142" y="78" width="12" height="10" fill="#221f17"/>
  <rect x="172" y="78" width="12" height="10" fill="#221f17"/>
  <rect x="172" y="62" width="12" height="10" fill="#221f17"/>
  <rect x="202" y="78" width="12" height="10" fill="#221f17"/>
  <rect x="232" y="78" width="12" height="10" fill="#221f17"/>
  <rect x="232" y="62" width="12" height="10" fill="#221f17"/>
  <rect x="262" y="78" width="12" height="10" fill="#221f17"/>

  <!-- left clue marks -->
  <rect x="50" y="112" width="10" height="12" fill="#221f17"/>
  <rect x="68" y="112" width="10" height="12" fill="#221f17"/>
  <rect x="50" y="130" width="10" height="12" fill="#221f17"/>
  <rect x="68" y="130" width="10" height="12" fill="#221f17"/>
  <rect x="68" y="148" width="10" height="12" fill="#221f17"/>
  <rect x="50" y="166" width="10" height="12" fill="#221f17"/>
  <rect x="68" y="166" width="10" height="12" fill="#221f17"/>

  <!-- play grid background -->
  <rect x="100" y="100" width="180" height="90" fill="#efe6d2"/>

  <!-- filled cells forming a heart shape (oxblood) -->
  <rect x="118" y="100" width="18" height="18" fill="#9b3a22"/>
  <rect x="172" y="100" width="18" height="18" fill="#9b3a22"/>
  <rect x="100" y="118" width="18" height="18" fill="#9b3a22"/>
  <rect x="118" y="118" width="18" height="18" fill="#9b3a22"/>
  <rect x="136" y="118" width="18" height="18" fill="#9b3a22"/>
  <rect x="154" y="118" width="18" height="18" fill="#9b3a22"/>
  <rect x="172" y="118" width="18" height="18" fill="#9b3a22"/>
  <rect x="190" y="118" width="18" height="18" fill="#9b3a22"/>
  <rect x="118" y="136" width="18" height="18" fill="#9b3a22"/>
  <rect x="136" y="136" width="18" height="18" fill="#9b3a22"/>
  <rect x="154" y="136" width="18" height="18" fill="#9b3a22"/>
  <rect x="172" y="136" width="18" height="18" fill="#9b3a22"/>
  <rect x="136" y="154" width="18" height="18" fill="#9b3a22"/>
  <rect x="154" y="154" width="18" height="18" fill="#9b3a22"/>

  <!-- cross marks on empty cells (ink) -->
  <g stroke="#221f17" stroke-width="3">
    <line x1="244" y1="106" x2="256" y2="118"/>
    <line x1="256" y1="106" x2="244" y2="118"/>
    <line x1="208" y1="160" x2="220" y2="172"/>
    <line x1="220" y1="160" x2="208" y2="172"/>
    <line x1="104" y1="160" x2="116" y2="172"/>
    <line x1="116" y1="160" x2="104" y2="172"/>
  </g>

  <!-- grid lines -->
  <g stroke="#6f6a3b" stroke-width="2">
    <line x1="118" y1="100" x2="118" y2="190"/>
    <line x1="136" y1="100" x2="136" y2="190"/>
    <line x1="154" y1="100" x2="154" y2="190"/>
    <line x1="172" y1="100" x2="172" y2="190"/>
    <line x1="190" y1="100" x2="190" y2="190"/>
    <line x1="208" y1="100" x2="208" y2="190"/>
    <line x1="226" y1="100" x2="226" y2="190"/>
    <line x1="244" y1="100" x2="244" y2="190"/>
    <line x1="262" y1="100" x2="262" y2="190"/>
    <line x1="100" y1="118" x2="280" y2="118"/>
    <line x1="100" y1="136" x2="280" y2="136"/>
    <line x1="100" y1="154" x2="280" y2="154"/>
    <line x1="100" y1="172" x2="280" y2="172"/>
  </g>

  <!-- outer frame -->
  <rect x="40" y="40" width="240" height="150" fill="none" stroke="#221f17" stroke-width="4"/>
  <line x1="100" y1="40" x2="100" y2="190" stroke="#221f17" stroke-width="4"/>
  <line x1="40" y1="100" x2="280" y2="100" stroke="#221f17" stroke-width="4"/>
</svg>
