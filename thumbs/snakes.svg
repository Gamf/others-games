  <rect x="205" y="124" width="2" height="8" fill="#9b3a22"/>
  <polygon points="203,132 207,132 205,128" fill="#9b3a22"/>
  <polygon points="205,132 209,132 207,128" fill="#9b3a22"/>

  <!-- food pellet (apple) -->
  <circle cx="246" cy="46" r="9" fill="#9b3a22"/>
  <rect x="245" y="34" width="2" height="6" fill="#221f17"/>
  <polygon points="247,36 256,32 252,40" fill="#6f6a3b"/>
