  <rect x="198" y="108" width="16" height="16" fill="#c8923a"/>
  <!-- eyes -->
  <rect x="202" y="118" width="4" height="4" fill="#221f17"/>
  <rect x="208" y="118" width="4" height="4" fill="#221f17"/>
