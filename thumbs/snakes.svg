  <rect x="76" y="26" width="2" height="148" fill="#6f6a3b"/>
  <rect x="96" y="26" width="2" height="148" fill="#6f6a3b"/>
  <rect x="116" y="26" width="2" height="148" fill="#6f6a3b"/>
  <rect x="136" y="26" width="2" height="148" fill="#6f6a3b"/>
  <rect x="156" y="26" width="2" height="148" fill="#6f6a3b"/>
  <rect x="176" y="26" width="2" height="148" fill="#6f6a3b"/>
  <rect x="196" y="26" width="2" height="148" fill="#6f6a3b"/>
  <rect x="216" y="26" width="2" height="148" fill="#6f6a3b"/>
  <rect x="236" y="26" width="2" height="148" fill="#6f6a3b"/>
  <rect x="256" y="26" width="2" height="148" fill="#6f6a3b"/>
