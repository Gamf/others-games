  <rect x="36" y="126" width="248" height="2" fill="#6f6a3b"/>
  <rect x="36" y="146" width="248" height="2" fill="#6f6a3b"/>

  <!-- snake body: a coiling chain of square segments -->
  <!-- tail entering bottom-left -->
  <rect x="58" y="128" width="16" height="16" fill="#9b3a22"/>
  <rect x="78" y="128" width="16" height="16" fill="#9b3a22"/>
  <rect x="98" y="128" width="16" height="16" fill="#9b3a22"/>
  <rect x="98" y="108" width="16" height="16" fill="#9b3a22"/>
  <rect x="98" y="88"  width="16" height="16" fill="#9b3a22"/>
  <rect x="118" y="88" width="16" height="16" fill="#9b3a22"/>
  <rect x="138" y="88" width="16" height="16" fill="#9b3a22"/>
  <rect x="158" y="88" width="16" height="16" fill="#9b3a22"/>
  <rect x="158" y="68" width="16" height="16" fill="#9b3a22"/>
  <rect x="178" y="68" width="16" height="16" fill="#9b3a22"/>
  <rect x="198" y="68" width="16" height="16" fill="#9b3a22"/>
  <rect x="198" y="88" width="16" height="16" fill="#9b3a22"/>
