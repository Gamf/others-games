<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#efe6d2"/>

  <!-- web strand from top -->
  <rect x="158" y="0" width="4" height="44" fill="#6f6a3b"/>

  <!-- back legs (olive, behind body) -->
  <g fill="none" stroke="#6f6a3b" stroke-width="7" stroke-linecap="round">
    <path d="M120 110 L74 86 L46 100"/>
    <path d="M120 124 L66 122 L36 138"/>
    <path d="M200 110 L246 86 L274 100"/>
    <path d="M200 124 L254 122 L284 138"/>
  </g>

  <!-- front legs (oxblood) -->
  <g fill="none" stroke="#9b3a22" stroke-width="8" stroke-linecap="round">
    <path d="M122 138 L70 150 L44 174"/>
    <path d="M198 138 L250 150 L276 174"/>
    <path d="M126 96 L82 70 L62 50"/>
    <path d="M194 96 L238 70 L258 50"/>
  </g>

  <!-- abdomen -->
  <ellipse cx="160" cy="138" rx="40" ry="46" fill="#221f17"/>
  <!-- abdomen marking (ochre hourglass-ish) -->
  <path d="M160 108 L172 132 L160 150 L148 132 Z" fill="#c8923a"/>
  <ellipse cx="160" cy="160" rx="9" ry="13" fill="#c8923a"/>

  <!-- cephalothorax (head) -->
  <ellipse cx="160" cy="92" rx="30" ry="26" fill="#221f17"/>
  <!-- head highlight -->
  <ellipse cx="160" cy="86" rx="18" ry="13" fill="#9b3a22"/>

  <!-- eyes -->
  <circle cx="150" cy="82" r="5" fill="#efe6d2"/>
  <circle cx="170" cy="82" r="5" fill="#efe6d2"/>
  <circle cx="150" cy="82" r="2.5" fill="#221f17"/>
  <circle cx="170" cy="82" r="2.5" fill="#221f17"/>
  <circle cx="142" cy="76" r="3" fill="#efe6d2"/>
  <circle cx="178" cy="76" r="3" fill="#efe6d2"/>
</svg>
