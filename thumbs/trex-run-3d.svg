<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- sky / background -->
  <rect x="0" y="0" width="320" height="200" fill="#efe6d2"/>

  <!-- low sun -->
  <circle cx="256" cy="58" r="26" fill="#c8923a"/>
  <circle cx="256" cy="58" r="18" fill="#d8a655"/>

  <!-- drifting clouds (blocky) -->
  <rect x="44" y="40" width="44" height="12" fill="#e3d8bf"/>
  <rect x="56" y="32" width="22" height="10" fill="#e3d8bf"/>
  <rect x="160" y="30" width="36" height="10" fill="#e3d8bf"/>
  <rect x="170" y="24" width="18" height="8" fill="#e3d8bf"/>

  <!-- pterodactyl flying overhead -->
  <g fill="#6f6a3b">
    <rect x="96" y="56" width="14" height="8"/>
    <polygon points="96,60 80,52 80,66"/>
    <polygon points="110,60 126,52 126,66"/>
    <rect x="108" y="54" width="8" height="6"/>
    <polygon points="116,54 124,52 116,60"/>
  </g>
  <rect x="111" y="56" width="3" height="3" fill="#221f17"/>

  <!-- desert ground band -->
  <rect x="0" y="150" width="320" height="50" fill="#6f6a3b"/>
  <rect x="0" y="150" width="320" height="6" fill="#7c774a"/>
  <!-- ground texture dots -->
  <rect x="20" y="166" width="10" height="4" fill="#5f5b32"/>
  <rect x="68" y="178" width="14" height="4" fill="#5f5b32"/>
  <rect x="132" y="170" width="10" height="4" fill="#5f5b32"/>
  <rect x="198" y="182" width="16" height="4" fill="#5f5b32"/>
  <rect x="268" y="168" width="12" height="4" fill="#5f5b32"/>

  <!-- cactus obstacle (right) -->
  <g fill="#4f5a2c">
    <rect x="232" y="108" width="16" height="46"/>
    <rect x="220" y="124" width="12" height="10"/>
    <rect x="220" y="116" width="8" height="18"/>
    <rect x="248" y="118" width="12" height="10"/>
    <rect x="252" y="106" width="8" height="22"/>
  </g>

  <!-- T-Rex runner (voxel blocks, oxblood) -->
  <g fill="#9b3a22">
    <!-- tail -->
    <rect x="40" y="118" width="10" height="8"/>
    <rect x="48" y="112" width="12" height="10"/>
    <!-- back / body -->
    <rect x="58" y="100" width="40" height="34"/>
    <!-- neck -->
    <rect x="90" y="86" width="18" height="22"/>
    <!-- head -->
    <rect x="100" y="78" width="34" height="24"/>
    <!-- snout/jaw -->
    <rect x="124" y="92" width="18" height="10"/>
    <!-- tiny arm -->
    <rect x="92" y="112" width="10" height="6"/>
    <!-- legs (mid-stride) -->
    <rect x="62" y="134" width="12" height="18"/>
    <rect x="84" y="134" width="12" height="14"/>
    <rect x="84" y="146" width="18" height="6"/>
  </g>
  <!-- darker belly / shading -->
  <rect x="58" y="124" width="40" height="10" fill="#823017"/>
  <rect x="62" y="148" width="12" height="4" fill="#823017"/>
  <!-- eye -->
  <rect x="118" y="84" width="6" height="6" fill="#efe6d2"/>
  <rect x="120" y="86" width="3" height="3" fill="#221f17"/>
  <!-- teeth -->
  <rect x="126" y="100" width="3" height="4" fill="#efe6d2"/>
  <rect x="132" y="100" width="3" height="4" fill="#efe6d2"/>
  <rect x="138" y="100" width="3" height="4" fill="#efe6d2"/>

  <!-- motion dust behind feet -->
  <rect x="30" y="146" width="10" height="4" fill="#c8923a"/>
  <rect x="22" y="140" width="8" height="4" fill="#c8923a"/>
  <rect x="14" y="148" width="8" height="4" fill="#c8923a"/>
</svg>
